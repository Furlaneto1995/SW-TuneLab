<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SW TuneLab</title>
<meta name="color-scheme" content="dark">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:#100b08;color:#f5d789;font-family:"Trebuchet MS",Arial,sans-serif}
  body{display:grid;place-items:center;padding:24px}
  main{width:min(520px,100%);padding:26px;border:2px solid #a97327;border-radius:14px;background:linear-gradient(#402916,#21160f);box-shadow:0 18px 45px #000;text-align:center}
  h1{margin:0 0 8px;color:#ffd46f}p{color:#bda170}
  nav{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
  a{padding:14px 10px;border:1px solid #9a6625;border-radius:7px;background:linear-gradient(#5a3c20,#281a11);color:#ffe09a;text-decoration:none;font-weight:900}
  a:hover{filter:brightness(1.15)}
</style>
<script>
(() => {
  const isMobile = matchMedia('(max-width: 700px)').matches ||
    (navigator.maxTouchPoints > 0 && Math.min(screen.width, screen.height) <= 700);
  const destination = isMobile ? './mobile/' : './desktop/';
  location.replace(destination + location.search + location.hash);
})();
</script>
</head>
<body>
<main>
  <h1>SW TuneLab</h1>
  <p>Escolha uma versão caso o redirecionamento automático não aconteça.</p>
  <nav><a href="./desktop/">Desktop</a><a href="./mobile/">Mobile</a></nav>
</main>
